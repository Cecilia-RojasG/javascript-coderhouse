<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aquí encontrará una tienda de juegos ficticia creada usando javaScript.">
    <meta name="keywords" content="javaScript Tienda de Juegos ficticia">
    <title>Tienda de Juegos Ficticia - Cecilia Rojas</title>
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- TOASTIFY -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Link a fuente Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- JS -->
    <script defer src="js/productos.js"></script>
    <script defer src="js/interacciones.js"></script>
    <script defer src="js/main.js"></script>
    
</head>
<body>
    <header>
        <h1>TIENDA DE JUEGOS</h1>
        <!-- Links de navegacion-->
        <div class="menu_completo">
            <nav class="nav" id="nav">
                <ul class="nav_list">
                    <li><a href="index.html">INICIO</a></li>
                    <li><a href="pages/productos.html">PRODUCTOS</a></li>
                    <li class="li-carrito">
                        <a href="pages/carrito.html" class="btn-carrito">   
                            CARRITO 
                            <!-- Icono SVG de Carrito -->
                            <svg xmlns="http://www.w3.org" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-cart">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="busquedaContenedor">
                <input type="text" id="inputBusqueda" placeholder="Buscar productos...">
                <button id="btnBusqueda">
                    <svg xmlns="http://www.w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <div id="contenedorResultados">
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-content">
            <p>&copy; 2024 Tienda de Juegos - Cecilia Rojas</p>
        </div>
    </footer>
    <!--JS Toastify-->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!--JS Sweetalert-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
